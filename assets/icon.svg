<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gfbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB877"/>
      <stop offset="0.55" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#F0663A"/>
    </linearGradient>
    <linearGradient id="gflid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF3E6"/>
    </linearGradient>
    <filter id="gfsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#B23F04" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 배경 라운드 스퀘어 -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#gfbg)"/>
  <!-- 부드러운 하이라이트 -->
  <ellipse cx="196" cy="150" rx="180" ry="90" fill="#FFFFFF" opacity="0.14"/>

  <!-- 뒤쪽 리본(위로 뻗은 두 귀) -->
  <g fill="#FFD24D">
    <path d="M214 150 C186 96, 150 92, 150 132 C150 164, 196 168, 232 170 Z"/>
    <path d="M298 150 C326 96, 362 92, 362 132 C362 164, 316 168, 280 170 Z"/>
  </g>
  <circle cx="256" cy="162" r="26" fill="#FFC233"/>

  <!-- 굿즈 박스 몸통 (귀여운 캐릭터) -->
  <g filter="url(#gfsh)">
    <rect x="150" y="196" width="212" height="196" rx="40" fill="url(#gflid)"/>
    <!-- 박스 뚜껑 -->
    <rect x="134" y="176" width="244" height="70" rx="30" fill="#FFFFFF"/>
    <!-- 세로 리본 띠 -->
    <rect x="238" y="176" width="36" height="216" rx="14" fill="#FFE1C2"/>
  </g>

  <!-- 얼굴 -->
  <g fill="#3A2A1A">
    <circle cx="212" cy="300" r="15"/>
    <circle cx="300" cy="300" r="15"/>
    <path d="M226 332 Q256 360 286 332" stroke="#3A2A1A" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 볼터치 -->
  <circle cx="188" cy="326" r="14" fill="#FF9E7A" opacity="0.7"/>
  <circle cx="324" cy="326" r="14" fill="#FF9E7A" opacity="0.7"/>

  <!-- 반짝이 -->
  <g fill="#FFFFFF">
    <path d="M398 214 l10 26 l26 10 l-26 10 l-10 26 l-10 -26 l-26 -10 l26 -10 Z" opacity="0.95"/>
    <circle cx="120" cy="250" r="9" opacity="0.85"/>
  </g>
</svg>
